<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Study Buddy - Chat</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* Custom animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message-bubble {
      animation: slideIn 0.3s ease-out;
    }
    
    /* Loading dots animation */
    @keyframes blink {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
    
    .loading-dot {
      animation: blink 1.4s infinite;
    }
    
    .loading-dot:nth-child(2) {
      animation-delay: 0.2s;
    }
    
    .loading-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    /* Custom scrollbar */
    .chat-container::-webkit-scrollbar {
      width: 8px;
    }
    
    .chat-container::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 10px;
    }
    
    .chat-container::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    
    .chat-container::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 h-screen overflow-hidden">
  
  <!-- Main Container -->
  <div class="flex flex-col h-screen max-w-4xl mx-auto">
    
    <!-- Header -->
    <header class="bg-white shadow-sm py-4 px-6 flex-shrink-0">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-2xl md:text-3xl font-bold text-indigo-900 flex items-center">
            🎓 AI Study Buddy
          </h1>
          <p class="text-gray-600 text-xs md:text-sm mt-1">
            Your personal AI study assistant with conversation memory
          </p>
        </div>
        <button
          id="newChatBtn"
          class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition flex items-center space-x-2"
          title="Start a new conversation"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          <span class="hidden md:inline">New Chat</span>
        </button>
      </div>
      <!-- Session Info -->
      <div class="mt-2 flex items-center text-xs text-gray-500">
        <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
        </svg>
        <span>Session: <code id="sessionDisplay" class="font-mono">Loading...</code></span>
      </div>
    </header>

    <!-- Chat Messages Container -->
    <div id="chatContainer" class="flex-1 overflow-y-auto bg-white px-4 md:px-6 py-6 chat-container">
      
      <!-- Welcome Message -->
      <div id="welcomeMessage" class="text-center py-12">
        <div class="text-6xl mb-4">👋</div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">Welcome to AI Study Buddy!</h2>
        <p class="text-gray-600 max-w-md mx-auto">
          Ask me anything about your studies. I'll remember our entire conversation!
        </p>
      </div>

      <!-- Messages will be appended here -->
      <div id="messagesContainer" class="space-y-4"></div>

      <!-- Typing Indicator -->
      <div id="typingIndicator" class="hidden flex items-start space-x-3 message-bubble">
        <div class="flex-shrink-0 w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center">
          <span class="text-sm">🤖</span>
        </div>
        <div class="bg-gray-100 rounded-2xl rounded-tl-none px-4 py-3 max-w-xs md:max-w-md">
          <div class="flex items-center space-x-2">
            <div class="w-2 h-2 bg-gray-400 rounded-full loading-dot"></div>
            <div class="w-2 h-2 bg-gray-400 rounded-full loading-dot"></div>
            <div class="w-2 h-2 bg-gray-400 rounded-full loading-dot"></div>
          </div>
        </div>
      </div>

    </div>

    <!-- Error Banner -->
    <div id="errorBanner" class="hidden bg-red-50 border-l-4 border-red-500 px-4 py-3 mx-4 md:mx-6 mb-2">
      <div class="flex items-start">
        <svg class="w-5 h-5 text-red-500 mt-0.5 mr-3 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
        </svg>
        <div class="flex-1">
          <p id="errorText" class="text-red-800 text-sm font-medium"></p>
        </div>
        <button id="closeErrorBtn" class="ml-2 text-red-500 hover:text-red-700">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Input Form -->
    <div class="bg-white border-t border-gray-200 px-4 md:px-6 py-4 flex-shrink-0">
      <form id="chatForm" class="flex items-end space-x-3">
        <div class="flex-1">
          <textarea
            id="messageInput"
            rows="1"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none transition"
            placeholder="Ask me anything..."
            maxlength="2000"
          ></textarea>
        </div>
        <button
          type="submit"
          id="submitBtn"
          class="bg-indigo-600 hover:bg-indigo-700 text-white p-3 rounded-lg transition duration-200 ease-in-out transform hover:scale-105 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none flex-shrink-0"
          title="Send message"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
        </button>
      </form>
      <p class="text-xs text-gray-500 mt-2">
        💡 Tip: I remember our entire conversation. You can refer to previous messages!
      </p>
    </div>

  </div>
  
  <!-- JavaScript -->
  <script src="script.js"></script>
  
</body>
</html>
